version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civicshield-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - civicshield-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend  # Ensure this exists in backend directory
    container_name: civicshield-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./civicshield.db
    networks:
      - civicshield-network
    volumes:
      - ./civicshield.db:/app/civicshield.db

networks:
  civicshield-network:
    driver: bridge

volumes:
  civicshield-db:
